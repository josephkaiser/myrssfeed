# nginx site config for myrssfeed.local
# Terminates TLS, redirects HTTP → HTTPS, proxies to uvicorn on 127.0.0.1:8080

server {
    listen 80;
    listen [::]:80;
    server_name myrssfeed.local;

    # Allow device-onboarding paths over plain HTTP so new devices can
    # download the CA certificate and register before they trust it.
    location /ca.crt            { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /ca.mobileconfig   { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /bootstrap.command { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /devices         { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /api/devices     { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myrssfeed.local;

    ssl_certificate     /etc/ssl/myrssfeed/myrssfeed.local.pem;
    ssl_certificate_key /etc/ssl/myrssfeed/myrssfeed.local-key.pem;

    # Modern TLS settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Security headers (HSTS intentionally omitted — add it back once the cert
    # chain is confirmed working on all devices, to avoid unbypassable lockouts)
    add_header X-Frame-Options           DENY                always;
    add_header X-Content-Type-Options    nosniff             always;

    # Proxy to uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support SSE / long-poll if added later
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # Clustering runs synchronously and can take several minutes on a Pi.
    # Give it the same 10-minute ceiling as the Python subprocess timeout.
    location /api/recluster {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  620s;
        proxy_send_timeout  620s;
    }
}
