<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic Map — myRSSfeed</title>
  <script>
    (function() {
      var t = localStorage.getItem("theme") || "system";
      var el = document.documentElement;
      if (t === "light") el.setAttribute("data-theme", "light");
      else if (t === "dark") el.setAttribute("data-theme", "dark");
      else el.removeAttribute("data-theme");
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<header>
  <a href="/" class="header-brand">myRSSfeed</a>
  <span style="flex:1; font-size:0.9rem; color:var(--muted); padding-left:0.5rem;">Topic Map</span>
  <div class="hamburger-wrap">
    <button class="btn icon-btn" id="hamburger-btn" onclick="toggleMenu()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <nav class="hamburger-menu" id="hamburger-menu" role="menu">
      <a href="/" role="menuitem"><span class="menu-icon">📰</span> My Feeds</a>
      <a href="/viz" class="active-page" role="menuitem"><span class="menu-icon">🗺️</span> Topic Map</a>
      <a href="/digest" role="menuitem"><span class="menu-icon">✨</span> Digest</a>
      <a href="/discover" role="menuitem"><span class="menu-icon">🔍</span> Discover</a>
      <a href="/settings" role="menuitem"><span class="menu-icon">⚙️</span> Settings</a>
    </nav>
  </div>
</header>

<div class="viz-wrap">
  <div class="viz-header">
    <h2 id="viz-status">Loading topic map…</h2>
  </div>
  <canvas id="viz-canvas"></canvas>
  <div id="viz-tooltip"></div>
</div>

<div id="toast"></div>
<script src="/static/viz.js"></script>
<script>
  // ── Hamburger ──
  const hamburgerBtn  = document.getElementById("hamburger-btn");
  const hamburgerMenu = document.getElementById("hamburger-menu");
  function toggleMenu() {
    const open = hamburgerMenu.classList.toggle("open");
    hamburgerBtn.setAttribute("aria-expanded", open);
  }
  document.addEventListener("click", (e) => {
    if (!hamburgerBtn.contains(e.target) && !hamburgerMenu.contains(e.target)) {
      hamburgerMenu.classList.remove("open");
      hamburgerBtn.setAttribute("aria-expanded", "false");
    }
  });
</script>
</body>
</html>
